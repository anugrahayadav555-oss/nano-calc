<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nano Calc</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A fast, minimal, installable mobile calculator.">
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <!-- History Panel -->
        <div class="history-panel" id="historyPanel">
            <div class="history-list" id="historyList">
                <!-- History items will be injected here -->
            </div>
            <div class="history-header">History</div>
        </div>

        <!-- Calculator UI -->
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-operand" id="currentOperand">0</div>
            </div>
            
            <div class="keypad">
                <button type="button" class="btn btn-action" data-action="clear">AC</button>
                <button type="button" class="btn btn-action" data-action="sqrt">√</button>
                <button type="button" class="btn btn-action" data-action="percent">%</button>
                <button type="button" class="btn btn-operator" data-operator="divide">÷</button>

                <button type="button" class="btn btn-number" data-number="7">7</button>
                <button type="button" class="btn btn-number" data-number="8">8</button>
                <button type="button" class="btn btn-number" data-number="9">9</button>
                <button type="button" class="btn btn-operator" data-operator="multiply">×</button>

                <button type="button" class="btn btn-number" data-number="4">4</button>
                <button type="button" class="btn btn-number" data-number="5">5</button>
                <button type="button" class="btn btn-number" data-number="6">6</button>
                <button type="button" class="btn btn-operator" data-operator="subtract">−</button>

                <button type="button" class="btn btn-number" data-number="1">1</button>
                <button type="button" class="btn btn-number" data-number="2">2</button>
                <button type="button" class="btn btn-number" data-number="3">3</button>
                <button type="button" class="btn btn-operator" data-operator="add">+</button>

                <button type="button" class="btn btn-action" data-action="fraction">1/x</button>
                <button type="button" class="btn btn-number" data-number="0">0</button>
                <button type="button" class="btn btn-number" data-number=".">.</button>
                <button type="button" class="btn btn-equals" data-action="equals">=</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
